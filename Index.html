<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclamação ao Sistema Imunológico da Amanda</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 1.6em;
        }

        textarea {
            width: 100%;
            height: 180px;
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Reclamação ao Sistema Imunológico da Amanda</h1>

    <form onsubmit="enviar(event)">
        <textarea placeholder="Escreva sua reclamação aqui..."></textarea>
        <button type="submit">Enviar</button>
    </form>
</div>

<script>
function enviar(event) {
    event.preventDefault();
    alert("Reclamação enviada! (Ou pelo menos fingimos que foi 😅)");
}
</script>

</body>
</html>
